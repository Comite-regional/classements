name: Synchro classements FFTA

on:
  # Exécution quotidienne à 2h00 du matin (heure UTC = 3h00 ou 4h00 en France)
  schedule:
    - cron: "0 2 * * *"

  # Permet aussi de lancer manuellement depuis l'onglet GitHub Actions
  workflow_dispatch:
    inputs:
      saison:
        description: "Saison (ex: 2026)"
        required: false
        default: ""

jobs:
  sync:
    name: Récupération des classements FFTA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installation des dépendances
        run: pip install requests

      - name: Récupération des classements
        env:
          FFTA_SESSION_IDENTITE: ${{ secrets.FFTA_SESSION_IDENTITE }}
          FFTA_SAISON: ${{ github.event.inputs.saison || '' }}
          FFTA_OUTPUT_DIR: data
        run: python fetch_ffta.py

      - name: Commit et push des JSON (si modifications)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Ne commit que s'il y a des changements
          git diff --cached --quiet || git commit -m "chore: synchro classements FFTA $(date +'%Y-%m-%d %H:%M UTC')"
          git push
